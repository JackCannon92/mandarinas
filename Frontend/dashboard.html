<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio – FCAD UNER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    .stat-card { border: none; border-radius: 12px; overflow: hidden; }
    .stat-card .stat-icon { font-size: 2.4rem; opacity: .9; }
    .stat-num { font-size: 2.6rem; font-weight: 700; line-height: 1; }
    .curso-item { transition: background .15s; }
    .curso-item:hover { background: #f1f3f5; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="dashboard.html"><img src="logo_fcad.png" alt="Logo" style="height:55px;object-fit:contain;"></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-4 me-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-house-door me-1"></i>Inicio</a></li>
        <li class="nav-item"><a class="nav-link active" href="index.html"><i class="bi bi-people me-1"></i>Estudiantes</a></li>
        <li class="nav-item"><a class="nav-link" href="cursos.html"><i class="bi bi-journal-bookmark me-1"></i>Cursos</a></li>
        <li class="nav-item"><a class="nav-link" href="inscripciones.html"><i class="bi bi-clipboard-check me-1"></i>Inscripciones</a></li>
      </ul>
      <div class="d-flex align-items-center">
        <span class="text-light me-3" id="navUsuario">Usuario</span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
      </div>
    </div>
  </div>
</nav>

<div class="container my-4">
  <h2 class="mb-4"><i class="bi bi-speedometer2 me-2 text-secondary"></i>Panel de Resumen</h2>

  <!-- Totales -->
  <div class="row g-4 mb-4">
    <div class="col-md-6">
      <div class="card stat-card shadow-sm text-white" style="background:#0d6efd;">
        <div class="card-body d-flex align-items-center justify-content-between">
          <div>
            <div class="stat-num" id="totalEstudiantes">—</div>
            <div class="mt-1">Estudiantes activos</div>
            <a href="index.html" class="text-white text-decoration-none small"><i class="bi bi-arrow-right-short"></i>Ver estudiantes</a>
          </div>
          <i class="bi bi-people-fill stat-icon"></i>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card stat-card shadow-sm text-white" style="background:#198754;">
        <div class="card-body d-flex align-items-center justify-content-between">
          <div>
            <div class="stat-num" id="totalCursos">—</div>
            <div class="mt-1">Cursos activos</div>
            <a href="cursos.html" class="text-white text-decoration-none small"><i class="bi bi-arrow-right-short"></i>Ver cursos</a>
          </div>
          <i class="bi bi-journal-bookmark-fill stat-icon"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- Links rápidos a cursos activos -->
  <div class="card shadow-sm">
    <div class="card-header bg-light fw-semibold"><i class="bi bi-lightning-charge me-2 text-warning"></i>Cursos activos</div>
    <div class="list-group list-group-flush" id="cursosActivos">
      <div class="list-group-item text-muted">Cargando...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
