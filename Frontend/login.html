<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión – FCAD UNER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card">

        <!-- Logo FCAD -->
        <div class="login-header">
            <img src="logo_fcad.png" alt="Logo FCAD UNER">
        </div>

        <p class="login-title">Sistema de Inscripción a Cursos</p>
        <p class="login-subtitle">Ingresá tus credenciales para continuar</p>

        <!-- Alerta de error -->
        <div id="alertaLogin" class="alert alert-danger d-none" role="alert"></div>

        <!-- Formulario -->
        <form id="formLogin" novalidate>

            <div class="mb-3">
                <label for="nombre_usuario" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input
                        type="text"
                        class="form-control"
                        id="nombre_usuario"
                        placeholder="nombre_usuario"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <div class="mb-3">
                <label for="contrasenia" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input
                        type="password"
                        class="form-control"
                        id="contrasenia"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                    <!-- Botón para mostrar/ocultar contraseña -->
                    <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="toggleClave"
                        tabindex="-1"
                        title="Mostrar / ocultar contraseña"
                    >
                        <i class="bi bi-eye" id="iconoClave"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-login" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>

        </form>

        <div class="login-footer">
            Facultad de Ciencias de la Administración &mdash; UNER &copy; 2026
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Toggle mostrar contraseña -->
    <script>
        document.getElementById('toggleClave').addEventListener('click', () => {
            const input  = document.getElementById('contrasenia');
            const icono  = document.getElementById('iconoClave');
            const visible = input.type === 'password';
            input.type   = visible ? 'text' : 'password';
            icono.className = visible ? 'bi bi-eye-slash' : 'bi bi-eye';
        });
    </script>

    <script src="js/login.js"></script>
</body>
</html>
